name: Rust

on:
  push:
  pull_request:

env:
  CARGO_TERM_COLOR: always

jobs:
  build:

    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v6
    - name: Install Dependencies
      run: |
          sudo apt update
          sudo apt install -y protobuf-compiler redis
    - name: Build
      run: cargo build --verbose
